name: 9Hits_Power_Bot
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Preparing System Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 libpango-1.0-0 libpangocairo-1.0-0

      - name: Downloading and Starting 9Hits
        run: |
          wget https://9hits.com/downloads/v3/9hits-viewer-linux-x64.tar.bz2
          tar -xjvf 9hits-viewer-linux-x64.tar.bz2
          cd 9hits-viewer-linux-x64
          # আপনার এপিআই কী দিয়ে সেশন রান করা হচ্ছে
          ./9hits-viewer --token=08aa8c374e5713f7a572bae472c75cc4 --allow-ca --session=s1 &
          ./9hits-viewer --token=08aa8c374e5713f7a572bae472c75cc4 --allow-ca --session=s2 &
          echo "Bot is running... Waiting for points to accumulate."
          sleep 340m
