name: 9Hits_Power_Bot
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Running 9Hits Viewer
        run: |
          # ডাউনলোড এবং আনজিপ
          curl -L https://9hits.com/downloads/v3/9hits-viewer-linux-x64.tar.bz2 -o 9hits.tar.bz2
          tar -xjvf 9hits.tar.bz2
          cd 9hits-viewer-linux-x64
          
          # ভিউয়ার রান করা (সরাসরি সেশন ২টা দিয়ে শুরু করুন)
          ./9hits-viewer --token=08aa8c374e5713f7a572bae472c75cc4 --allow-ca --session=s1 &
          ./9hits-viewer --token=08aa8c374e5713f7a572bae472c75cc4 --allow-ca --session=s2
        timeout-minutes: 350
